name = "aman-digital-blog-rebuild"
main = "src/index.js"
compatibility_date = "2026-06-23"

# Jadwal rebuild: setiap 12 jam (pukul 00:00 & 12:00 UTC = 07:00 & 19:00 WIB).
# 2 build/hari (~60/bulan) — aman jauh di bawah kuota Pages Free 500 build/bulan.
# Ubah bila perlu, mis. "0 */3 * * *" = tiap 3 jam.
[triggers]
crons = ["0 */12 * * *"]

# Aktifkan Workers Logs supaya console.log / error terlihat di dashboard
# (Workers & Pages -> worker ini -> Logs) dan lewat `wrangler tail`.
[observability]
enabled = true

# CATATAN: jangan menaruh URL deploy hook di sini. Simpan sebagai SECRET:
#   npx wrangler secret put DEPLOY_HOOK
